<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIAJA USA - Asesoría Migratoria</title>
    
    <!-- Estilos críticos integrados para evitar pantalla blanca -->
    <style>
        :root { --primary: #dc2626; --dark: #111827; }
        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--dark); 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        .bg-main {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                              url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 1rem;
            color: #1f2937;
        }
    </style>

    <!-- Carga diferida de recursos externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-main">
        <!-- Header -->
        <header class="bg-white shadow-md sticky top-0 z-50 text-gray-900">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center font-bold text-xl text-red-600">
                    <img src="VIAJA-USA-14-10-2024.png" alt="Logo" class="h-10 mr-2" onerror="this.style.display='none'">
                    VIAJA USA
                </div>
                <a href="https://wa.me/526381124294" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            </div>
        </header>

        <!-- Hero -->
        <section class="py-16 px-4 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">VIAJA USA</h1>
            <p class="text-lg opacity-90 max-w-xl mx-auto">Asesoría experta en trámites migratorios.</p>
        </section>

        <!-- IA Tools -->
        <main class="container mx-auto px-4 space-y-8 pb-20">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="glass-card p-6 shadow-xl">
                    <h3 class="text-xl font-bold mb-4 text-blue-700">Analizador de Perfil ✨</h3>
                    <textarea id="profile-text" class="w-full h-24 p-3 border rounded-lg mb-3 text-sm" placeholder="Cuéntanos tu situación..."></textarea>
                    <button onclick="analyzeProfile()" id="btn-analyze" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Analizar Perfil</button>
                    <div id="analysis-result" class="mt-3 hidden p-3 bg-blue-50 rounded-lg text-xs border border-blue-100"></div>
                </div>

                <div class="glass-card p-6 shadow-xl">
                    <h3 class="text-xl font-bold mb-4 text-red-700">Borrador de Carta ✨</h3>
                    <input type="text" id="letter-purpose" class="w-full p-3 border rounded-lg mb-3 text-sm" placeholder="Motivo de tu viaje...">
                    <button onclick="generateLetter()" id="btn-letter" class="w-full bg-red-600 text-white py-2 rounded-lg font-bold">Generar Borrador</button>
                    <div id="letter-result" class="mt-3 hidden p-3 bg-red-50 rounded-lg text-xs border border-red-100 italic"></div>
                </div>
            </div>

            <!-- Chat -->
            <div id="chat" class="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden text-gray-800">
                <div class="bg-gray-800 p-4 text-white font-bold text-center text-sm uppercase tracking-widest">Asistente Inteligente</div>
                <div id="chat-box" class="h-64 overflow-y-auto p-4 space-y-4 bg-gray-50 text-sm">
                    <div class="bg-blue-100 p-3 rounded-lg max-w-[80%]">Hola Elizabeth, ¿cómo podemos ayudarte con tu trámite hoy?</div>
                </div>
                <div class="p-4 border-t flex gap-2 bg-white">
                    <input type="text" id="user-input" class="flex-1 border rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-red-500 outline-none" placeholder="Escribe tu duda aquí...">
                    <button onclick="sendMessage()" class="bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </main>

        <footer class="mt-auto py-8 text-center text-xs opacity-50">
            <p>&copy; 2024 VIAJA USA | Puerto Peñasco, Sonora | 638 112 4294</p>
        </footer>
    </div>

    <script>
        // Configuración segura
        const apiKey = ""; 
        
        // Función de envío de mensajes
        async function fetchGemini(prompt, system) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "No hay respuesta disponible.";
            } catch (err) {
                return "Hubo un problema de conexión. Por favor contacta al 638 112 4294.";
            }
        }

        async function analyzeProfile() {
            const val = document.getElementById('profile-text').value;
            const res = document.getElementById('analysis-result');
            if (!val) return;
            res.classList.remove('hidden');
            res.innerText = "Procesando...";
            const sys = "Analiza perfil migratorio seriamente. Indica puntos fuertes y débiles. Prohibido dar guías o links externos. Finaliza pidiendo contactar al 6381124294.";
            res.innerText = await fetchGemini(val, sys);
        }

        async function generateLetter() {
            const val = document.getElementById('letter-purpose').value;
            const res = document.getElementById('letter-result');
            if (!val) return;
            res.classList.remove('hidden');
            res.innerText = "Redactando...";
            const sys = "Redacta una carta de intención de viaje profesional y formal.";
            res.innerText = await fetchGemini(val, sys);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();
            if (!msg) return;

            // User message
            const userDiv = document.createElement('div');
            userDiv.className = 'flex justify-end';
            userDiv.innerHTML = `<div class="bg-red-600 text-white p-3 rounded-lg max-w-[80%]">${msg}</div>`;
            chatBox.appendChild(userDiv);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // AI Response
            const sys = "Eres el asistente de VIAJA USA. Solo das requisitos. Prohibido enlaces externos o tutoriales paso a paso. Citas al 6381124294.";
            const response = await fetchGemini(msg, sys);
            
            const aiDiv = document.createElement('div');
            aiDiv.className = 'flex justify-start';
            aiDiv.innerHTML = `<div class="bg-gray-200 p-3 rounded-lg max-w-[80%] text-gray-800">${response.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(aiDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Manejo de Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
