<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIAJA USA - Asesoría Migratoria</title>
    
    <!-- Estilos Críticos en Línea (Evitan Pantalla Blanca) -->
    <style>
        :root { --primary: #dc2626; --bg: #0f172a; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .main-wrapper {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { background: white; color: black; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; color: #1f2937; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn { cursor: pointer; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-red { background: var(--primary); color: white; }
        .btn-blue { background: #2563eb; color: white; }
        .chat-area { height: 300px; overflow-y: auto; background: #f9fafb; border-radius: 10px; padding: 15px; border: 1px solid #e5e7eb; margin-bottom: 10px; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    </style>

    <!-- Tailwind y FontAwesome (Carga Asíncrona) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div style="font-weight: 800; font-size: 1.2rem; color: #dc2626;">VIAJA USA</div>
            <a href="https://wa.me/526381124294" style="background:#22c55e; color:white; padding: 8px 15px; border-radius: 20px; text-decoration:none; font-weight:bold; font-size: 0.8rem;">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </header>

        <div class="container">
            <section style="text-align: center; padding: 40px 0;">
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Expertos Migratorios</h1>
                <p style="opacity: 0.8;">Tu trámite de visa y pasaporte en manos seguras.</p>
            </section>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Analizador -->
                <div class="card">
                    <h3 class="font-bold text-lg mb-2 text-blue-800">Analizador de Perfil ✨</h3>
                    <textarea id="profile-input" placeholder="Cuéntanos tu situación laboral y familiar..."></textarea>
                    <button onclick="runAnalysis()" id="btn-ana" class="btn btn-blue">Analizar Mi Perfil</button>
                    <div id="ana-res" class="mt-3 hidden p-3 bg-blue-50 text-sm border rounded"></div>
                </div>

                <!-- Carta -->
                <div class="card">
                    <h3 class="font-bold text-lg mb-2 text-red-700">Borrador de Carta ✨</h3>
                    <input type="text" id="letter-input" placeholder="¿Cuál es tu motivo de viaje?">
                    <button onclick="runLetter()" id="btn-let" class="btn btn-red">Generar Carta</button>
                    <div id="let-res" class="mt-3 hidden p-3 bg-red-50 text-sm border rounded italic"></div>
                </div>
            </div>

            <!-- Chat -->
            <div class="card mt-8">
                <div class="font-bold text-sm uppercase mb-3 border-b pb-2">Asistente Virtual</div>
                <div id="chat-output" class="chat-area text-sm">
                    <div class="bg-gray-200 p-3 rounded-lg mb-2 max-w-[90%]">Hola Elizabeth, ¿qué duda tienes sobre tu trámite?</div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Pregunta sobre requisitos..." style="margin-bottom:0">
                    <button onclick="runChat()" class="btn btn-red" style="width: 50px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <footer style="text-align: center; padding: 40px 0; font-size: 0.7rem; opacity: 0.6;">
                VIAJA USA | Puerto Peñasco, Sonora | 638 112 4294
            </footer>
        </div>
    </div>

    <script>
        const key = ""; 

        async function askIA(p, s) {
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: p }] }],
                        systemInstruction: { parts: [{ text: s }] }
                    })
                });
                const d = await r.json();
                return d.candidates[0].content.parts[0].text;
            } catch (e) {
                return "Error de conexión. Llama al 6381124294.";
            }
        }

        async function runAnalysis() {
            const i = document.getElementById('profile-input').value;
            const r = document.getElementById('ana-res');
            if(!i) return;
            r.classList.remove('hidden');
            r.innerText = "Evaluando...";
            r.innerText = await askIA(i, "Analiza perfil migratorio seriamente. Puntos fuertes y débiles. No guías. Contacto 6381124294.");
        }

        async function runLetter() {
            const i = document.getElementById('letter-input').value;
            const r = document.getElementById('let-res');
            if(!i) return;
            r.classList.remove('hidden');
            r.innerText = "Redactando...";
            r.innerText = await askIA(i, "Escribe una carta de intención formal para viaje.");
        }

        async function runChat() {
            const i = document.getElementById('chat-input');
            const o = document.getElementById('chat-output');
            const v = i.value.trim();
            if(!v) return;

            const u = document.createElement('div');
            u.className = "bg-red-100 p-2 rounded mb-2 text-right ml-auto max-w-[80%]";
            u.innerText = v;
            o.appendChild(u);
            i.value = '';

            const res = await askIA(v, "Asistente VIAJA USA. Solo requisitos. No links. Citas al 6381124294.");
            const a = document.createElement('div');
            a.className = "bg-white border p-2 rounded mb-2 max-w-[80%]";
            a.innerHTML = res.replace(/\n/g, '<br>');
            o.appendChild(a);
            o.scrollTop = o.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key === 'Enter') runChat(); });
    </script>
</body>
</html>
